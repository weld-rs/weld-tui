# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
tone_instructions: "Be direct and concise. Focus on correctness and security over style."
early_access: false

reviews:
  profile: "chill"
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  high_level_summary_instructions: >-
    Create concise release notes as a bullet-point list, but only if the
    original PR body is insufficient or inaccurate. Extend or clarify the
    PR body content; don't duplicate it.
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false
  request_changes_workflow: false
  commit_status: true
  review_status: false
  poem: false
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false
  suggested_reviewers: false

  path_filters:
    # Build artifacts
    - "!target/**"
    # Lock files (Renovate handles these)
    - "!Cargo.lock"
    # Test fixtures are sample content, not real code
    - "!test-fixtures/**"

  path_instructions:
    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions CI/CD workflows. Review for:
        - Third-party actions pinned to SHA digests, not tags
        - Secrets never logged or exposed in outputs
        - Least-privilege permissions on workflow permissions
        - Reusable workflows (prefixed with _) should use workflow_call trigger
    - path: "weld-core/**"
      instructions: |
        Core library crate (diff engine, merge logic, file I/O). Review for:
        - No TUI dependencies — this crate must remain frontend-agnostic
        - Public API surface should be minimal and well-documented
        - Error types should be meaningful and actionable
    - path: "weld-tui/**"
      instructions: |
        TUI binary crate (ratatui-based UI). Review for:
        - UI logic separated from business logic (delegate to weld-core)
        - Keybindings follow vim conventions where applicable
    - path: "justfile"
      instructions: |
        Task runner recipes. Review for:
        - Recipes that call external scripts should not use @ prefix (preserves debug output)

  auto_review:
    enabled: true
    auto_incremental_review: true
    # Skip mechanical Renovate PRs to avoid rate-limit churn and review noise.
    # CI still validates these PRs.
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "chore(deps)" # Renovate: routine dependency updates
      - "fix(deps)" # Renovate: security/CVE updates
    drafts: false
    base_branches:
      - "main"

  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
